# ---------------------------------------------------------------------------
# NGINX configuration for the OTel Lab frontend
#
# Responsibilities:
#   1. Serve static files (HTML/CSS/JS) from /usr/share/nginx/html
#   2. Reverse-proxy API calls (/api/*) to the FastAPI backend
#
# enterprise: this mirrors the NGINX ingress or API gateway pattern where
# a single entry point routes traffic to multiple upstream services.
# ---------------------------------------------------------------------------

events {
    # Maximum simultaneous connections per worker process.
    # Default 1024 is fine for a lab; tune in production.
    worker_connections 1024;
}

http {
    # Include standard MIME types so browsers receive correct Content-Type headers
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------------------------------------------------------------------
    # Upstream block: declares the FastAPI backend as a named upstream.
    # "backend" resolves via Docker's internal DNS to the backend container.
    # enterprise: in k8s this would be a ClusterIP service name.
    # ---------------------------------------------------------------------------
    upstream fastapi_backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;   # catch-all; replace with real hostname in production

        # ------------------------------------------------------------------
        # Static files — serve the SPA / landing page
        # ------------------------------------------------------------------
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            # try_files: if the exact file isn't found, fall back to index.html
            # (needed for single-page apps with client-side routing)
            try_files $uri $uri/ /index.html;
        }

        # ------------------------------------------------------------------
        # API proxy — strip /api prefix and forward to FastAPI
        # e.g. GET /api/items → GET /items on backend:8000
        # enterprise: the /api prefix convention is standard when an API
        # gateway or NGINX sits in front of multiple microservices.
        # ------------------------------------------------------------------
        location /api/ {
            proxy_pass         http://fastapi_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Pass trace context headers through — critical for Phase 2
            # so that the browser-to-NGINX-to-FastAPI span chain is connected.
            # enterprise: W3C TraceContext headers are the standard propagation
            # format used by Datadog, Jaeger, Zipkin, and OTel alike.
            proxy_pass_header  traceparent;
            proxy_pass_header  tracestate;
        }

        # ------------------------------------------------------------------
        # Health check endpoint served by NGINX itself (no backend needed)
        # Docker Compose uses this to verify the frontend container is up.
        # ------------------------------------------------------------------
        location /nginx-health {
            access_log off;      # suppress noise in access logs
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
